# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - DockerHub account username (al3ks9)
#   DOCKERHUB_TOKEN     - DockerHub access token (not your password)
#   POSTGRES_DB         - Postgres database name
#   POSTGRES_USER       - Postgres username
#   POSTGRES_PASSWORD   - Postgres password

name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            al3ks9/devnotes-backend:latest
            al3ks9/devnotes-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            al3ks9/devnotes-frontend:latest
            al3ks9/devnotes-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
