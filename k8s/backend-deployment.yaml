apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devnotes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: al3ks9/devnotes-backend:latest
          command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devnotes-secret
                  key: DATABASE_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: devnotes-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devnotes
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
